# ── Jetson tmux.conf ──────────────────────────────────────────────────
# Install: ln -sf ~/jetson-terminal-config/tmux/tmux.conf ~/.tmux.conf

# ── Prefix: C-a instead of C-b ───────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10               # fast escape for vim users
set -g focus-events on

# ── Status bar ────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style 'bg=colour235 fg=colour248'
set -g status-left '#[fg=colour214,bold] #S #[fg=colour248]│ '
set -g status-left-length 30
set -g status-right '#[fg=colour248]│ #[fg=colour109]#(hostname) #[fg=colour248]│ #[fg=colour142]%H:%M '
set -g status-right-length 50

# Window tabs
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=colour214,bold] #I:#W '
setw -g window-status-separator ''

# Pane borders
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour214'

# ── Vim-style pane navigation ─────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing with Alt+arrow ──────────────────────────────────────
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# ── Splits: | for vertical, - for horizontal ─────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── New window in current path ────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ── Reload config ─────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Copy mode (vim-style) ────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Quick Jetson health pane ──────────────────────────────────────────
bind G split-window -h -l 40 'bash ~/jetson-terminal-config/scripts/jetson-health.sh --watch'
