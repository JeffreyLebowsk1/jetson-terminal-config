# ── Starship prompt for Jetson ─────────────────────────────────────────
# Install: mkdir -p ~/.config && ln -sf ~/jetson-terminal-config/starship/starship.toml ~/.config/starship.toml
# Install starship: curl -sS https://starship.rs/install.sh | sh

format = """
$hostname$directory$git_branch$git_status$python$docker_context$cmd_duration$line_break$character"""

[hostname]
ssh_only = true
style = "bold yellow"
format = "[$hostname]($style):"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[python]
style = "bold green"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[docker_context]
style = "bold blue"
format = "[$symbol$context]($style) "

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[$duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
